# Mondays 15:00 UTC — outreach pitch drafts.
name: Agent — Distribution Finder
on:
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke agent-runner
        env:
          BASE: ${{ secrets.AGENT_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$BASE" && test -n "$SECRET"
          curl -sS -f -X POST "$BASE/api/cron/agent-runner?agent=distribution_finder" \
            -H "Authorization: Bearer $SECRET" \
            -H "Accept: application/json"

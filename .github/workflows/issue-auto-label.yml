name: Auto-label new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const labels = new Set();

            // ops — governance, CI, contracts, run ledger, gates
            if (/\[ops\]|gate:|pr.sentinel|enforcement|continuity|run ledger|governance|source.truth/.test(title)) {
              labels.add('ops');
            }

            // intake — raw thoughts, open threads, whiteboard entries
            if (/\[intake\]|open thread|whiteboard/.test(title) ||
                /raw thought:|classification:|bucket:/.test(body)) {
              labels.add('intake');
            }

            // frontend — UI, visual, mobile, Codex UI tasks
            if (/codex:|frontend|ui:|mobile|layout|screenshot|visual/.test(title)) {
              labels.add('frontend');
            }

            // handoff — session handoff issues
            if (/handoff|fresh session/.test(title)) {
              labels.add('handoff');
            }

            // product — feature/seam work, rungs, named fixes
            if (/^rung \d|^feat[:(]|^fix[:(]|right.now|dashboard|connector|scoring|prove |first.run|onboard/.test(title)) {
              labels.add('product');
            }

            if (labels.size === 0) return;

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: [...labels],
              });
              core.info(`Applied labels: ${[...labels].join(', ')}`);
            } catch (err) {
              core.warning(`Could not apply labels: ${err.message}`);
            }

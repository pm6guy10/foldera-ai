name: Deploy to Vercel

# Fires after the CI workflow completes on main.
# Using workflow_run (not push) means:
#   1. Deploy only happens when build + tests pass.
#   2. Vercel Hobby enforces ~100 production deployments / 24h (code: api-deployments-free-per-day).
#      Skip CLI when a READY production deployment already matches this commit (Git integration).
#      If Git is still BUILDING/QUEUED for this SHA, preflight waits (bounded) before CLI.
#   3. If CLI hits api-deployments-free-per-day, check-ready: exit 0 if Git landed READY anyway.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: vercel-prod-cli-foldera
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Preflight — skip CLI if Git integration already (or soon) READY at this SHA
        id: skip_check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: python3 scripts/ci/vercel-deploy-preflight.py preflight

      - name: Skip CLI deploy (production already at this commit)
        if: ${{ steps.skip_check.outputs.skip_cli == 'true' }}
        run: |
          echo "::notice::Deploy workflow finished without CLI upload — www should already match ${{ github.event.workflow_run.head_sha }} (confirm GET /api/health revision)."

      - uses: actions/setup-node@v5
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        run: npm ci

      - name: Install Vercel CLI
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel project environment
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt artifacts to production
        if: ${{ steps.skip_check.outputs.skip_cli != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          attempt=1
          while [ "$attempt" -le 3 ]; do
            echo "vercel deploy --prebuilt attempt ${attempt}/3"
            set +e
            out=$(vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN" 2>&1)
            code=$?
            set -e
            printf '%s\n' "$out"
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            if printf '%s' "$out" | grep -q 'api-deployments-free-per-day'; then
              echo "::notice::CLI hit api-deployments-free-per-day — re-checking if Git integration deployed this commit…"
              if python3 scripts/ci/vercel-deploy-preflight.py check-ready; then
                echo "::notice::www should match $HEAD_SHA — confirm GET /api/health revision."
                exit 0
              fi
              echo "::error::Vercel Hobby daily deployment limit (api-deployments-free-per-day) and production is not READY at this commit yet. Wait for rolling 24h, disable duplicate Git vs CLI, or upgrade Pro. Confirm www via GET /api/health."
              exit 1
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "All deploy attempts failed"
              exit 1
            fi
            echo "Waiting 45s before retry (transient race with Git integration or in-flight deploy)..."
            sleep 45
            attempt=$((attempt + 1))
          done

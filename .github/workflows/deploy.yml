name: Deploy to Vercel

# Fires after the CI workflow completes on main.
# Using workflow_run (not push) means:
#   1. Deploy only happens when build + tests pass.
#   2. No double-deploy if Vercel GitHub integration is also configured —
#      this runs after CI, the integration runs on raw push, they race but
#      both result in the same commit being live (idempotent).
#   3. Works regardless of committer identity (VERCEL_TOKEN auth, not
#      Vercel Hobby's committer allowlist).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy when CI actually passed — skip on failure or cancel.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize CLI deploys: parallel runs (duplicate workflow_run delivery, or overlap with the
    # previous commit’s deploy) often make `vercel deploy --prebuilt` exit 1 while `vercel build`
    # succeeded — classic race with Vercel’s own GitHub integration finishing first.
    concurrency:
      group: vercel-prod-cli-foldera
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the commit that CI ran on, not whatever HEAD is now.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # --archive=tgz: one upload instead of thousands of file API calls (avoids
      # Hobby "api-upload-free" 5000/24h limit — see Vercel CLI deploy docs).
      - name: Deploy prebuilt artifacts to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "vercel deploy --prebuilt attempt ${attempt}/3"
            if vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "All deploy attempts failed"
              exit 1
            fi
            echo "Waiting 45s before retry (transient race with Git integration or in-flight deploy)..."
            sleep 45
          done

name: Agent — Retention Analyst
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke agent-runner
        env:
          BASE: ${{ secrets.AGENT_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$BASE" && test -n "$SECRET"
          curl -sS -f -X POST "$BASE/api/cron/agent-runner?agent=retention_analyst" \
            -H "Authorization: Bearer $SECRET" \
            -H "Accept: application/json"

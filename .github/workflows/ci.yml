name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: npx vitest run --exclude ".claude/worktrees/**"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate CI test secret
        run: echo "NEXTAUTH_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: E2E flow gate
        env:
          NEXTAUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: npm run test:ci:e2e

# Runs the workday-presence trigger-runner on a real schedule instead of only
# on a manual dashboard "sync now" click. Right Now cards are meant to
# interrupt as-needed, not once a day — this is the as-needed heartbeat.
# Issue #361.
#
# Calls the trigger-runner lib directly (scripts/workday-presence-trigger-runner-cron.ts)
# instead of POSTing to the Vercel HTTP route. The HTTP route requires a
# CRON_SECRET GitHub Actions secret that was never provisioned, so every run
# 401'd silently; this mirrors the already-working loop-health-guardian.yml
# pattern of calling Supabase/Slack directly with secrets that are already set.
name: Workday Presence Trigger Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsx scripts/workday-presence-trigger-runner-cron.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOLDERA_SELF_USER_ID: ${{ secrets.FOLDERA_SELF_USER_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FOLDERA_SLACK_SELF_CHANNEL_ID: ${{ secrets.FOLDERA_SLACK_SELF_CHANNEL_ID }}

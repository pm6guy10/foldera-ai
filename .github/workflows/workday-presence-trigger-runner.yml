# Workday-presence trigger-runner — manual lever only (production heartbeat runs OFF GitHub Actions).
#
# History:
#   - Issue #361 shipped this as a GitHub Actions schedule (every 15 min) that
#     curled the Vercel route with a CRON_SECRET never provisioned to Actions,
#     so every run 401'd silently.
#   - Issue #364 / PR #365 (f173bdc) removed that dead CRON_SECRET-over-HTTP path
#     by calling the lib directly via scripts/workday-presence-trigger-runner-cron.ts.
#   - Then GitHub Actions itself was found CAPPED on this private repo: runners no
#     longer start, so EVERY workflow (this one, Health Gate, Production E2E, ...)
#     instant-fails with no runner assigned. Lifting the Actions spend cap is
#     explicitly out of scope.
#
# Because Actions can't run a schedule here, the production 15-minute heartbeat
# runs via a free EXTERNAL cron service (e.g. cron-job.org) calling the existing
# Vercel HTTP route every 15 minutes — no GitHub Actions, no new spend:
#
#   GET https://www.foldera.ai/api/cron/workday-presence-trigger-runner
#   Header:   Authorization: Bearer <CRON_SECRET>     # already set in Vercel env
#   Schedule: */15 * * * *
#
# The route (app/api/cron/workday-presence-trigger-runner/route.ts) runs the same
# maybeRunWorkdayPresenceTriggerRunnerForUser logic this script does. Full setup
# runbook is in the PR for issue #364.
#
# The `schedule:` trigger was removed because it can never fire while Actions is
# capped — it only generated 15-min failure noise. This workflow is retained
# solely as a manual lever (workflow_dispatch) that runs the direct script.
name: Workday Presence Trigger Runner

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsx scripts/workday-presence-trigger-runner-cron.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOLDERA_SELF_USER_ID: ${{ secrets.FOLDERA_SELF_USER_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FOLDERA_SLACK_SELF_CHANNEL_ID: ${{ secrets.FOLDERA_SLACK_SELF_CHANNEL_ID }}

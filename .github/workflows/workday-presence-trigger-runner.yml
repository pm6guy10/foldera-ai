# Runs the workday-presence trigger-runner on a real schedule instead of only
# on a manual dashboard "sync now" click. Right Now cards are meant to
# interrupt as-needed, not once a day — this is the as-needed heartbeat.
# Issue #361.
name: Workday Presence Trigger Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run trigger-runner
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          URL="https://www.foldera.ai/api/cron/workday-presence-trigger-runner"
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "$URL" \
            -H "Authorization: Bearer $CRON_SECRET")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP $http_code | $body"

          if [ "$http_code" != "200" ]; then
            echo "ERROR: Non-200 response."
            exit 1
          fi

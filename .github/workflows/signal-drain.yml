name: Signal Backlog Drain

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Drain unprocessed signals
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          URL="https://www.foldera.ai/api/cron/process-unprocessed-signals?maxSignals=5"
          MAX_ITERATIONS=20
          SLEEP_BETWEEN=5
          total_processed=0

          for i in $(seq 1 $MAX_ITERATIONS); do
            response=$(curl -s -w "\n%{http_code}" \
              -X POST "$URL" \
              -H "Authorization: Bearer $CRON_SECRET")

            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)

            processed=$(echo "$body" | grep -o '"processed":[0-9]*' | grep -o '[0-9]*' || echo "0")
            remaining=$(echo "$body" | grep -o '"remaining":[0-9]*' | grep -o '[0-9]*' || echo "?")

            total_processed=$((total_processed + processed))

            echo "[$i/$MAX_ITERATIONS] HTTP $http_code | processed=$processed remaining=$remaining | total=$total_processed"

            if [ "$http_code" != "200" ]; then
              echo "ERROR: Non-200 response. Body: $body"
              exit 1
            fi

            if [ "$remaining" = "0" ]; then
              echo ""
              echo "Backlog drained! Total processed: $total_processed"
              exit 0
            fi

            if [ "$processed" = "0" ]; then
              echo ""
              echo "No signals processed this round (all quarantined or deferred). Total: $total_processed"
              exit 0
            fi

            sleep $SLEEP_BETWEEN
          done

          echo ""
          echo "Reached max iterations ($MAX_ITERATIONS). Total processed: $total_processed, remaining: $remaining"

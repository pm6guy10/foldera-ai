name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Docs-fast lane.
#
# Fires only on markdown / docs-only changes. Completes in <15s. Emits the same
# `ci-passed` job name as `.github/workflows/ci.yml` so branch protection does
# not need a matrix of required checks — ONE required check covers every path.
#
# Triggered by:
#   - any **/*.md, **/*.mdx change
#   - anything under docs/ or audit-reports/
#   - SESSION_HISTORY.md, README.md, LESSONS_LEARNED.md, CURRENT_STATE.md, AGENTS.md
#
# If a PR touches markdown AND code, the code paths match ci.yml's triggers so
# the full lane runs there. This docs-fast workflow's own path filter excludes
# code paths defensively so it never races the real CI.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # NOTE: GitHub Actions forbids `paths` and `paths-ignore` on the same event.
  # `paths:` is already an allow-list (only fires when at least one changed
  # file matches), so the old `paths-ignore:` block was redundant AND made
  # this workflow invalid — it was failing at startup on every push, before
  # any job ran, which painted every commit on main with a spurious red X.
  # Allow-list is sufficient: pushes that also touch code will trigger
  # ci.yml's own `paths:` match, and the runtime check-name `ci-passed` is
  # emitted from whichever workflow fires.
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "audit-reports/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "audit-reports/**"

concurrency:
  group: ci-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-passed:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - name: Docs-only PR — skip build + tests
        run: |
          echo "::notice::Docs-only change — no runtime, no Playwright, no deploy."
          echo "Changed paths under this trigger are markdown/docs only."

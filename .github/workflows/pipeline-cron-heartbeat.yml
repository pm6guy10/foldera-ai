# After daily-brief cron (~11:10 UTC): fail if no cron_complete row landed in Supabase.
name: Pipeline cron heartbeat

on:
  schedule:
    - cron: '40 11 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Mirror the working production-e2e fetch path: scheduled heartbeat should
      # validate the latest main check script, not depend on an exact SHA fetch.
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npm run check:pipeline-heartbeat
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

name: PR Sentinel

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "middleware.ts"
      - "public/**"
      - "scripts/**"
      - "supabase/**"
      - "tests/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".foldera-contract.json"
      - "ACTIVE_HANDOFF.md"
      - "ACTIVE_SEAM_STATE.json"
      - "FOLDERA_BUILD_ORDER.yaml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "middleware.ts"
      - "public/**"
      - "scripts/**"
      - "supabase/**"
      - "tests/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".foldera-contract.json"
      - "ACTIVE_HANDOFF.md"
      - "ACTIVE_SEAM_STATE.json"
      - "FOLDERA_BUILD_ORDER.yaml"
  merge_group:

jobs:
  pr-sentinel:
    name: pr-sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Source truth check
        run: npx tsx scripts/source-truth-check.ts
      - name: Continuity gate
        run: npm run gate:continuity

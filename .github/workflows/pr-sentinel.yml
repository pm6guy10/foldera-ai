name: PR Sentinel

on: [workflow_dispatch]

jobs:
  pr-sentinel:
    name: pr-sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Source truth check
        run: npx tsx scripts/source-truth-check.ts
      - name: Continuity gate
        run: npm run gate:continuity

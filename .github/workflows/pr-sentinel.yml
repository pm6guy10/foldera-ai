name: PR Sentinel

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  pr-sentinel:
    name: pr-sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Continuity gate
        run: npm run gate:continuity

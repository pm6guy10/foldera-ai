name: semgrep

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "middleware.ts"
      - "scripts/**"
      - "supabase/**"
      - ".github/workflows/semgrep.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "middleware.ts"
      - "scripts/**"
      - "supabase/**"
      - ".github/workflows/semgrep.yml"

concurrency:
  group: semgrep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

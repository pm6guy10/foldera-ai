name: Production E2E

on:
  deployment_status:
  schedule:
    - cron: "15 11 * * *" # 15 min after nightly-ops (11:00 UTC)
  workflow_dispatch:
    inputs:
      include_live_brief_proof:
        description: "Run the owner-only live brief proof suite"
        required: false
        default: "false"

# One active post-deploy run per deployment environment / ref. Superseded
# previews cancel their own validation runs instead of racing each other.
concurrency:
  group: production-e2e-${{ github.event.deployment_status.environment || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        github.event.deployment_status.environment == 'Production'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FOLDERA_INCLUDE_AUTH_PROD_SMOKE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      FOLDERA_INCLUDE_LIVE_BRIEF_PROOF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_live_brief_proof == 'true' && 'true' || 'false' }}
    steps:
      # Use latest `main` test sources. `deployment_status` would otherwise checkout the deployed
      # commit, which can lag behind test fixes while production URL is already current.
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install chromium

      - name: Restore auth state
        if: env.FOLDERA_INCLUDE_AUTH_PROD_SMOKE == 'true'
        run: echo '${{ secrets.FOLDERA_AUTH_STATE }}' > tests/production/auth-state.json

      - name: Refresh auth state
        if: env.FOLDERA_INCLUDE_AUTH_PROD_SMOKE == 'true'
        run: npx tsx tests/production/refresh-auth.ts
        continue-on-error: true

      - name: Describe production monitor contract
        run: |
          echo "Scheduled success means the public production contract is healthy on current main:"
          echo "- landing/start/login/pricing routes load"
          echo "- locked /start CTA copy is intact"
          echo "- lite /api/health stays healthy"
          echo "Authenticated and live-brief proof remain workflow_dispatch-only."

      - name: Wait for production to serve this commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in {1..30}; do
            body="$(curl -fsS https://www.foldera.ai/api/health || true)"
            live_sha="$(node -e "try { const h = JSON.parse(process.argv[1] || '{}'); console.log(h?.revision?.git_sha || '') } catch { console.log('') }" "$body")"
            echo "production health sha=${live_sha:-missing} expected=$EXPECTED_SHA attempt=$attempt"
            if [ "$live_sha" = "$EXPECTED_SHA" ]; then
              exit 0
            fi
            sleep 10
          done

          echo "::error::Production health did not report expected SHA $EXPECTED_SHA before E2E."
          exit 1

      - name: Run public production contract smoke
        run: npm run test:prod

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: e2e-results
          path: tests/production/results.json

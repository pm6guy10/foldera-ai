name: Production E2E

on:
  deployment_status:
  schedule:
    - cron: '15 11 * * *' # 15 min after nightly-ops (11:00 UTC)
  workflow_dispatch:

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install chromium

      - name: Restore auth state
        run: echo '${{ secrets.FOLDERA_AUTH_STATE }}' > tests/production/auth-state.json

      - name: Refresh auth state
        run: npx tsx tests/production/refresh-auth.ts
        continue-on-error: true

      - run: npm run test:prod

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: tests/production/results.json

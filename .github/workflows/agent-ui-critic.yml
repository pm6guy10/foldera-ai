# Manual dispatch — Playwright screenshots; optional Sonnet critique when paid_proof is enabled.
name: Agent — UI Critic
on:
  workflow_dispatch:
    inputs:
      paid_proof:
        description: 'Owner only — run Sonnet UX critique (bills Anthropic). Default is screenshots + placeholder only.'
        type: boolean
        default: false

jobs:
  ui-critic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run UI critic script
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AGENT_UI_BASE_URL: ${{ secrets.AGENT_BASE_URL }}
          ALLOW_PAID_LLM: ${{ github.event.inputs.paid_proof == 'true' && 'true' || 'false' }}
        run: npx tsx scripts/agent-ui-critic.ts

version: 1
authority: SUPREME_EXECUTION_QUEUE
authority_law: FOLDERA_EXECUTION_QUEUE.yaml overrides every other markdown source-truth file for execution routing.
routing_mode: DETERMINISTIC_EXECUTION
queue_update_law: Agents may not deviate from this queue without a signed-off QUEUE_UPDATE commit from Brandon.
agent_law:
  - Read this file first for execution routing.
  - Identify the first ACTIVE task.
  - Execute only that task.
  - When proof passes, mark it COMPLETED, move the next QUEUED task to ACTIVE, and continue.
  - Do not ask what is next.
  - Do not start audits, hygiene passes, or source-truth reconciliation.
  - Do not touch files outside the ACTIVE task allowed_files list.
holy_crap_mvp_loop: "Marcus approved the estimate -> Approval Received -> Next Move: Send Estimate -> Done click updates state -> durable receipt proves the loop."
items:
  - id: "001"
    task: "Create deterministic mock evidence fixture: Marcus approved the estimate."
    status: COMPLETED
    allowed_files:
      - tests/fixtures/work-packets/source-signals.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
    stop_condition: "a) fixture contains Marcus approval evidence; b) fixture source trail includes actor, action, subject, and timestamp; c) focused work-packet test consumes the fixture without live connector fetch."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts --reporter=verbose"
  - id: "002"
    task: "Build state inference from Waiting on Marcus to Approval Received and Next Move: Send Estimate."
    status: COMPLETED
    allowed_files:
      - lib/work-packets/generator.ts
      - lib/work-packets/types.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
    stop_condition: "a) Waiting on Marcus input is detected; b) Marcus approval evidence changes verdict to Approval Received; c) generated packet next_move is Send Estimate."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts --reporter=verbose"
  - id: "003"
    task: "Generate the Right Now review card with the Marcus source trail."
    status: COMPLETED
    allowed_files:
      - lib/slack-test-mode/work-packet-review.ts
      - lib/slack-test-mode/__tests__/work-packet-review.test.ts
      - lib/work-packets/types.ts
    stop_condition: "a) card title reflects Approval Received; b) card action is Send Estimate; c) source trail names the Marcus approval evidence."
    proof_gate: "npm run test -- run lib/slack-test-mode/__tests__/work-packet-review.test.ts --reporter=verbose"
  - id: "004"
    task: "Implement Done click state mutation for the Marcus estimate loop."
    status: COMPLETED
    allowed_files:
      - lib/work-packets/transitions.ts
      - lib/workday-presence/__tests__/work-packet-state-update.test.ts
      - lib/work-packets/types.ts
    stop_condition: "a) Done action marks the work packet completed; b) workday state records Send Estimate as completed; c) no live Slack or provider send occurs."
    proof_gate: "npm run test -- run lib/workday-presence/__tests__/work-packet-state-update.test.ts --reporter=verbose"
  - id: "005"
    task: "Create durable proof receipt for the full Marcus loop."
    status: COMPLETED
    allowed_files:
      - lib/work-packets/receipt.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
      - lib/slack-test-mode/__tests__/work-packet-review.test.ts
      - lib/workday-presence/__tests__/work-packet-state-update.test.ts
    stop_condition: "a) receipt records fixture signals; b) receipt records card generation and Done mutation; c) receipt proves paid_model_call_required=false, live_connector_fetch_required=false, and live_send_performed=false."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts lib/slack-test-mode/__tests__/work-packet-review.test.ts lib/workday-presence/__tests__/work-packet-state-update.test.ts --reporter=verbose"
  - id: "006"
    task: "Add queue-aware source-truth gate that requires exactly one ACTIVE task."
    status: COMPLETED
    allowed_files:
      - scripts/source-truth-check.ts
      - tests/config/__tests__/source-truth-check.test.ts
      - FOLDERA_EXECUTION_QUEUE.yaml
    stop_condition: "a) gate parses queue; b) gate fails on zero or multiple ACTIVE tasks; c) gate reports the active task id."
    proof_gate: "npm run gate:command"
  - id: "007"
    task: "Add queue advancement test for COMPLETED to ACTIVE promotion."
    status: COMPLETED
    allowed_files:
      - tests/config/__tests__/source-truth-check.test.ts
      - scripts/source-truth-check.ts
      - FOLDERA_EXECUTION_QUEUE.yaml
    stop_condition: "a) completed task is ignored; b) next queued task can become ACTIVE; c) queue order remains deterministic."
    proof_gate: "npm run test -- run tests/config/__tests__/source-truth-check.test.ts --reporter=verbose"
  - id: "008"
    task: "Persist Marcus loop receipt as a deterministic artifact fixture."
    status: COMPLETED
    allowed_files:
      - tests/fixtures/work-packets/marcus-estimate-receipt.json
      - lib/work-packets/receipt.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
    stop_condition: "a) JSON receipt fixture exists; b) receipt validates against work-packet receipt shape; c) receipt can be regenerated deterministically."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts --reporter=verbose"
  - id: "009"
    task: "Add no-send rail assertion to the Marcus card path."
    status: COMPLETED
    allowed_files:
      - lib/slack-test-mode/work-packet-review.ts
      - lib/slack-test-mode/__tests__/work-packet-review.test.ts
    stop_condition: "a) review card is TEST_MODE only; b) payload exposes no live send target; c) test fails if live send metadata appears."
    proof_gate: "npm run test -- run lib/slack-test-mode/__tests__/work-packet-review.test.ts --reporter=verbose"
  - id: "010"
    task: "Add safe-silence case when Marcus approval evidence is absent."
    status: COMPLETED
    allowed_files:
      - tests/fixtures/work-packets/source-signals.ts
      - lib/work-packets/generator.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
    stop_condition: "a) waiting state without approval creates no Send Estimate action; b) receipt says no intervention; c) source trail explains missing evidence."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts --reporter=verbose"
  - id: "011"
    task: "Add conflicting evidence case and preserve one-verdict output."
    status: COMPLETED
    allowed_files:
      - tests/fixtures/work-packets/source-signals.ts
      - lib/work-packets/generator.ts
      - lib/work-packets/__tests__/work-packet-brain.test.ts
    stop_condition: "a) conflicting signals do not produce multiple actions; b) selected verdict is deterministic; c) receipt records why alternatives were ignored."
    proof_gate: "npm run test -- run lib/work-packets/__tests__/work-packet-brain.test.ts --reporter=verbose"
  - id: "012"
    task: "Expose a local proof script for the Marcus loop."
    status: ACTIVE
    allowed_files:
      - scripts/proof-marcus-estimate-loop.ts
      - package.json
      - lib/work-packets/**
      - tests/fixtures/work-packets/source-signals.ts
    stop_condition: "a) npm script runs one deterministic Marcus loop; b) script prints receipt JSON; c) script exits nonzero on missing Done mutation."
    proof_gate: "npm run proof:marcus-estimate-loop"
  - id: "013"
    task: "Create first user journey shell for the estimate approval loop."
    status: QUEUED
    allowed_files:
      - app/foldera-loop/page.tsx
      - components/foldera-loop/**
      - tests/e2e/foldera-loop.spec.ts
    stop_condition: "a) route renders current state, evidence, one next move, and one Done action; b) no dashboard/task-list UI appears; c) Playwright proves no horizontal overflow."
    proof_gate: "npm run test:e2e -- tests/e2e/foldera-loop.spec.ts --reporter=list"
  - id: "014"
    task: "Wire journey shell to deterministic Marcus fixture only."
    status: QUEUED
    allowed_files:
      - app/foldera-loop/page.tsx
      - components/foldera-loop/**
      - lib/work-packets/**
      - tests/e2e/foldera-loop.spec.ts
    stop_condition: "a) shell reads deterministic fixture; b) shell shows Send Estimate from receipt; c) shell does not fetch live connector/provider data."
    proof_gate: "npm run test:e2e -- tests/e2e/foldera-loop.spec.ts --reporter=list"
  - id: "015"
    task: "Persist one source-backed workday state path locally."
    status: QUEUED
    allowed_files:
      - lib/workday-presence/source-backed-state.ts
      - lib/workday-presence/__tests__/source-backed-state.test.ts
      - lib/work-packets/types.ts
    stop_condition: "a) state stores waiting_on, approval_received, next_move, and source ids; b) update is deterministic; c) test uses local fixture only."
    proof_gate: "npm run test -- run lib/workday-presence/__tests__/source-backed-state.test.ts --reporter=verbose"
  - id: "016"
    task: "Connect Done action to persisted local workday state."
    status: QUEUED
    allowed_files:
      - lib/workday-presence/source-backed-state.ts
      - lib/workday-presence/__tests__/source-backed-state.test.ts
      - lib/work-packets/transitions.ts
    stop_condition: "a) Done mutates persisted state; b) mutation preserves receipt id; c) duplicate Done is idempotent."
    proof_gate: "npm run test -- run lib/workday-presence/__tests__/source-backed-state.test.ts --reporter=verbose"
  - id: "017"
    task: "Add privacy rail proof for source-backed state."
    status: QUEUED
    allowed_files:
      - lib/workday-presence/source-backed-state.ts
      - lib/workday-presence/__tests__/source-backed-state.test.ts
      - scripts/privacy-rail-check.ts
    stop_condition: "a) no secret/token fields are persisted; b) no raw message body is required for proof; c) privacy rail command fails on forbidden fields."
    proof_gate: "npm run gate:privacy-rail"
  - id: "018"
    task: "Add trust copy to the journey shell without enterprise claims."
    status: QUEUED
    allowed_files:
      - app/foldera-loop/page.tsx
      - components/foldera-loop/**
      - tests/e2e/foldera-loop.spec.ts
    stop_condition: "a) page states local fixture/no-send truth; b) page avoids enterprise/compliance claims; c) test greps forbidden claims."
    proof_gate: "npm run test:e2e -- tests/e2e/foldera-loop.spec.ts --reporter=list"
  - id: "019"

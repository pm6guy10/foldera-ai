# FOLDERA_BUILD_ORDER.yaml — machine-readable command state.
# Governance Collapse v1 (issue #240): historical completed/closed issue ledgers
# were pruned; GitHub issues/PRs and git history are the archive. The
# launch_ladder below is the ordering authority for the build sequence.
writeback_required: true
source_truth_closeout_required: true
source_truth_closeout_values:
  - updated
  - unchanged - reason
  - not applicable - reason
source_of_truth_order:
  - ACTIVE_HANDOFF.md
  - active GitHub issue
  - FOLDERA_BUILD_ORDER.yaml
  - .foldera-contract.json
  - FOLDERA_MASTER_BIBLE.md
  - AGENTS.md
  - docs/SOURCE_OF_TRUTH_MAP.md
accepted_terminal_states:

# FOLDERA_BUILD_ORDER.yaml — machine-readable command state.
# Governance Collapse v1 (issue #240): historical completed/closed issue ledgers
# were pruned; GitHub issues/PRs and git history are the archive. The
# launch_ladder below is the ordering authority for the build sequence.
writeback_required: true
source_truth_closeout_required: true
source_truth_closeout_values:
  - updated
  - unchanged - reason
  - not applicable - reason
source_of_truth_order:
  - ACTIVE_HANDOFF.md
  - active GitHub issue
  - FOLDERA_BUILD_ORDER.yaml
  - .foldera-contract.json
  - FOLDERA_MASTER_BIBLE.md
  - AGENTS.md
  - docs/SOURCE_OF_TRUTH_MAP.md
accepted_terminal_states:
  - MERGED_AND_CLOSED
  - BLOCKED_WITH_EXACT_RECEIPT
  - HUMAN_REVIEW_REQUIRED_WITH_REASON
  - STOPPED_WITH_AUTHORIZED_REASON
active_issue: none
priority_class: BETWEEN_RUNGS
work_type: PRODUCT_CORE
why_this_first: Issue #249 (right-now scorer-backed selection invariant) is COMPLETE — PR #257 merged 2026-06-11. Next: open rung-7 issue (non-owner paid loop) and assign it here.
next_seam: open rung-7 issue (non-owner paid loop) — assign before starting work
required_gate_command: npm run gate:continuity
paused_issues:
  - issue: 178
    state: SUSPENDED
    reason: Governance merge clerk paused while the Product MVP is the priority.
launch_ladder:
  - rung: 1
    name: Prove sources become signals, signals become context, and context becomes one next move
    status: COMPLETE
    issue: 194
    pr: 201
  - rung: 2
    name: Prove one durable response/state/receipt loop
    status: ABSORBED_BY_RUNG_1
    absorbed_by_pr: 201
  - rung: 3
    name: Build the first user journey shell
    status: COMPLETE
    issue: 208
    pr: 215
  - rung: 4
    name: Prove trust/privacy/no-send rail
    status: COMPLETE
    issue: 216
    pr: 218
  - rung: 5
    name: Add bounded self-serve early-access payment path
    status: COMPLETE
    issue: 220
    evidence: live proof via Supabase MCP + Vercel MCP; user_subscriptions row persists; Stripe routes deployed
  - rung: 6
    name: Prove owner-path readiness — sign-in + Slack self-loop
    status: COMPLETE
    issue: 226
    pr: 256
    evidence: all 3 sub-proofs done 2026-06-11; Gmail + Microsoft sign-in both working; Slack self-loop PASS with state_source='scored_winner'; proof receipt https://github.com/pm6guy10/foldera-ai/issues/226#issuecomment-4685107461
  - rung: 7
    name: Prove money-ready MVP end to end — non-owner paid loop
    status: PENDING
    issue: needs_issue
    completion_criteria: non-owner user completes full loop from onboard to one paid action with durable receipt; forbidden until rung 6 (issue #226) is proven
  - rung: 8
    name: Prove first non-owner validation
    status: PENDING
    issue: needs_issue
    completion_criteria: one person who is not Brandon completes the loop and names one concrete value
closeout_required_each_pr:
  ACTIVE_HANDOFF.md: updated / unchanged - reason / not applicable - reason
  FOLDERA_BUILD_ORDER.yaml: updated / unchanged - reason / not applicable - reason
  docs/SOURCE_OF_TRUTH_MAP.md: updated / unchanged - reason / not applicable - reason
  next_seam: named / blocked - reason
